<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Engine Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 16px 24px;
            border-radius: 8px;
            font-size: 14px;
        }

        .info h2 {
            margin-bottom: 12px;
            color: #6366f1;
        }

        .info p {
            margin: 4px 0;
            opacity: 0.8;
        }

        .info kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="info">
        <h2>🎮 Game Engine Demo</h2>
        <p><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> - Move</p>
        <p><kbd>Space</kbd> - Jump</p>
        <p><kbd>Mouse</kbd> - Look around</p>
    </div>
    <canvas id="game-canvas"></canvas>
    <script type="module" src="./src/examples/BasicDemo.ts"></script>
</body>

</html>
