<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeEngine | Editor</title>
    <link rel="icon" type="image/png" href="/assets/icon1.png">
    
    <!-- 🛡️ Sovereign Elite Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https:;
        connect-src 'self' 
            http://localhost:* 
            ws://localhost:* 
            http://127.0.0.1:* 
            https://api.github.com 
            https://openrouter.ai 
            https://*.openrouter.ai;
        font-src 'self' data: https://fonts.gstatic.com;
    ">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body,
        #editor-root {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05050a; /* VibeTheme.colors.bgPrimary */
            color: #ffffff;
        }
    </style>
</head>

<body>
    <div id="editor-root"></div>
    <script type="module" src="./src/presentation/features/editor/main.tsx"></script>
</body>

</html>
